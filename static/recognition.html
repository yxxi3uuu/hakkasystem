<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拍照學習 - 客語隨拍隨學</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .upload-zone {
      margin: 16px;
      border: 2px dashed #4CAF50;
      border-radius: 16px;
      padding: 48px 20px;
      text-align: center;
      background: #F1F8E9;
      cursor: pointer;
      transition: background 0.15s;
    }
    .upload-zone:hover { background: #E8F5E9; }
    .upload-zone input { display: none; }
    .upload-icon { font-size: 48px; margin-bottom: 12px; }
    .upload-zone h3 { font-size: 16px; color: #2E7D32; margin-bottom: 6px; }
    .upload-zone p  { font-size: 13px; color: #888; }

    #preview-wrap { margin: 0 16px 16px; display: none; }
    #preview-wrap img { width: 100%; border-radius: 12px; }

    .result-card {
      background: white;
      border-radius: 16px;
      margin: 0 16px 16px;
      padding: 20px;
      display: none;
    }
    .result-word  { font-size: 28px; font-weight: 800; color: #2E7D32; margin-bottom: 4px; }
    .result-roman { font-size: 16px; color: #666; margin-bottom: 12px; }
    .result-example { font-size: 13px; color: #888; background: #f5f5f5; border-radius: 8px; padding: 10px; }

    .tip-list { padding: 8px 16px 16px; }
    .tip-list li { font-size: 13px; color: #666; margin-bottom: 6px; line-height: 1.5; list-style: none; padding-left: 4px; }
  </style>
</head>
<body>

  <div class="top-bar">
    <span style="font-size:22px;">📷</span>
    <h1>拍照學習客語</h1>
  </div>
  <p style="font-size:13px;color:#888;padding:12px 16px 0;">上傳圖片或拍照，系統會自動識別並教你客語發音</p>

  <label class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" capture="environment" />
    <div class="upload-icon">📸</div>
    <h3>點擊上傳圖片</h3>
    <p>支援 JPG、PNG 格式</p>
  </label>

  <div id="preview-wrap">
    <img id="previewImg" src="" alt="預覽" />
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-word"  id="resultWord">--</div>
    <div class="result-roman" id="resultRoman">--</div>
    <div class="result-example" id="resultExample">--</div>
    <button class="btn btn-primary btn-block" style="margin-top:14px;" onclick="resetUpload()">再拍一張</button>
  </div>

  <div class="section">
    <div class="section-title">💡 使用提示</div>
    <ul class="tip-list">
      <li>• 拍攝時確保光線充足，物品清晰</li>
      <li>• 支援物品識別和文字識別</li>
      <li>• 每個詞彙都會自動生成例句幫助學習</li>
    </ul>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="/"><div class="nav-icon">🏠</div><div class="nav-label">首頁</div></a>
    <a class="nav-item active" href="/recognition"><div class="nav-icon">📷</div><div class="nav-label">拍照學習</div></a>
    <a class="nav-item" href="/practice"><div class="nav-icon">🎤</div><div class="nav-label">語音練習</div></a>
    <a class="nav-item" href="/game"><div class="nav-icon">🎮</div><div class="nav-label">配對遊戲</div></a>
    <a class="nav-item" href="/record"><div class="nav-icon">📊</div><div class="nav-label">學習記錄</div></a>
    <a class="nav-item" href="/profile"><div class="nav-icon">👤</div><div class="nav-label">個人中心</div></a>
  </nav>

  <script>
    const MOCK = [
      { word: "蘋果", roman: "phìn-kó",  example: "例句：我想吃蘋果。" },
      { word: "貓咪", roman: "miāu",      example: "例句：那隻貓咪很可愛。" },
      { word: "桌子", roman: "tó-é",      example: "例句：書放在桌子上。" },
    ];

    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('previewImg').src = ev.target.result;
        document.getElementById('preview-wrap').style.display = 'block';
        document.getElementById('uploadZone').style.display = 'none';

        // 模擬辨識結果（之後接真實 API）
        setTimeout(() => {
          const r = MOCK[Math.floor(Math.random() * MOCK.length)];
          document.getElementById('resultWord').textContent   = r.word;
          document.getElementById('resultRoman').textContent  = r.roman;
          document.getElementById('resultExample').textContent = r.example;
          document.getElementById('resultCard').style.display = 'block';
        }, 800);
      };
      reader.readAsDataURL(file);
    });

    function resetUpload() {
      document.getElementById('uploadZone').style.display = 'block';
      document.getElementById('preview-wrap').style.display = 'none';
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('fileInput').value = '';
    }
  </script>
</body>
</html>
